services:
  app:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-}
        VITE_HCAPTCHA_SITE_KEY: ${VITE_HCAPTCHA_SITE_KEY:-}
    ports:
      - "80:3000"
    environment:
      PORT: 3000
      DATABASE_URI: ${DATABASE_URI:-sqlite:/app/data/database.sqlite}
      DB_SYNC: ${DB_SYNC:-false}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      ENABLE_METRICS: ${ENABLE_METRICS:-true}
      SERVICE_NAME: ${SERVICE_NAME:-arthur-mcp-adapter}
      SERVICE_VERSION: ${SERVICE_VERSION:-1.0.0}
      PROMETHEUS_METRICS_PATH: ${PROMETHEUS_METRICS_PATH:-/metrics}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # To use MySQL locally: docker compose --profile mysql up
  # then set DATABASE_URI=mysql://mcp:mcppassword@mysql:3306/mcp_db
  mysql:
    image: mysql:8.0
    profiles: [mysql]
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mcp_db
      MYSQL_USER: mcp
      MYSQL_PASSWORD: mcppassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # To use PostgreSQL locally: docker compose --profile postgres up
  # then set DATABASE_URI=postgres://mcp:mcppassword@postgres:5432/mcp_db
  postgres:
    image: postgres:16-alpine
    profiles: [postgres]
    environment:
      POSTGRES_DB: mcp_db
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: mcppassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp -d mcp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sqlite_data:
  mysql_data:
  postgres_data:
