services:
  app:
    build: .
    ports:
      - "80:3000"
    environment:
      PORT: 3000
      DATABASE: ${DATABASE:-sqlite}
      SQLITE_PATH: /app/data/database.sqlite
      DB_HOST: ${DB_HOST:-}
      DB_PORT: ${DB_PORT:-}
      DB_USER: ${DB_USER:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME:-}
      DB_SSL: ${DB_SSL:-false}
      DB_SYNC: ${DB_SYNC:-false}
      DASHBOARD_USER: ${DASHBOARD_USER:-admin}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-admin}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      ENABLE_METRICS: ${ENABLE_METRICS:-true}
      SERVICE_NAME: ${SERVICE_NAME:-arthur-mcp-adapter}
      SERVICE_VERSION: ${SERVICE_VERSION:-1.0.0}
      PROMETHEUS_METRICS_PATH: ${PROMETHEUS_METRICS_PATH:-/metrics}
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mysql:
    image: mysql:8.0
    profiles: [mysql]
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ${DB_NAME:-mcp_db}
      MYSQL_USER: ${DB_USER:-mcp}
      MYSQL_PASSWORD: ${DB_PASSWORD:-mcppassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    profiles: [postgres]
    environment:
      POSTGRES_DB: ${DB_NAME:-mcp_db}
      POSTGRES_USER: ${DB_USER:-mcp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mcppassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mcp}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sqlite_data:
  mysql_data:
  postgres_data:
