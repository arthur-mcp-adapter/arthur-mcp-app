networks:
  backend:
    driver: bridge

volumes:
  sqlite_data:
    driver: local

services:

  # ── NestJS backend (API only) ────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-dashboard
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - SQLITE_PATH=/app/data/database.sqlite
    volumes:
      - sqlite_data:/app/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── React frontend (nginx serves static files + proxies to backend) ──────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mcp-frontend
    ports:
      - "80:80"
    networks:
      - backend
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
