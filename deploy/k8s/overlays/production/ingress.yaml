apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: arthur-mcp
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: arthur-mcp-redirect-https@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts: [app.arthurmcp.io]
      secretName: arthur-mcp-tls
  rules:
    - host: app.arthurmcp.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: arthur-mcp
                port:
                  name: http
