apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: arthur-mcp
spec:
  podSelector:
    matchLabels:
      app: arthur-mcp
  policyTypes: [Ingress, Egress]
  ingress:
    # Traefik (kube-system) is the only expected caller of the app pods.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 3000
  egress:
    # DNS + external dependencies (Supabase Postgres/Auth over TLS).
    - {}
