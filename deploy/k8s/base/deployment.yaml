apiVersion: apps/v1
kind: Deployment
metadata:
  name: arthur-mcp
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: arthur-mcp
  template:
    metadata:
      labels:
        app: arthur-mcp
    spec:
      serviceAccountName: arthur-mcp
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: app
          image: ghcr.io/arthur-mcp-adapter/arthur-mcp-app:main
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: arthur-mcp-config
            - secretRef:
                name: arthur-mcp-secrets
          startupProbe:
            httpGet:
              path: /live
              port: http
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /live
              port: http
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
          lifecycle:
            preStop:
              exec:
                # Gives the Service/Traefik time to stop routing before SIGTERM.
                command: ["sleep", "5"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
