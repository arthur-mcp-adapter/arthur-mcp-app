upstream backend { server app:3000; }

server {
    listen 80;

    # ── API NestJS ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── MCP endpoints (usados por Claude, Cursor, etc.) ────────────────────────
    location /mcp/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 300s;
    }

    location /health   { proxy_pass http://backend; }
    location /mcp-docs { proxy_pass http://backend; }

    # ── SPA React (servido pelo NestJS via express.static em dist/public/) ──────
    # Tudo o mais vai para o backend, que serve index.html via SpaFilter
    location / {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
