name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run type-check
      - run: npm test
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci --prefix api
      - run: npm test --prefix api
      - run: npm run build --prefix api

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: arthur-mcp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-test /health
        run: |
          docker run -d --name smoke -p 3000:3000 \
            -e DATABASE_URI=sqlite:/app/data/database.sqlite \
            -e SUPABASE_URL=https://placeholder.supabase.co \
            -e SUPABASE_PUBLISHABLE_KEY=sb_publishable_placeholder \
            -e SUPABASE_SECRET_KEY=sb_secret_placeholder \
            -e SUPABASE_JWKS_URL=https://placeholder.supabase.co/auth/v1/.well-known/jwks.json \
            -e JWT_SECRET=ci-smoke-secret-at-least-16-chars \
            arthur-mcp:ci
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/ready; then exit 0; fi
            sleep 2
          done
          echo "app never became ready" >&2
          docker logs smoke >&2 || true
          exit 1
