services:
  # ── Full-stack app (frontend + backend built together via Dockerfile) ───────
  #
  # Render free tier notes:
  #   • The service sleeps after 15 min of inactivity (free plan).
  #   • MongoDB: use MongoDB Atlas M0 free cluster — https://cloud.mongodb.com
  #     Create a free cluster, whitelist 0.0.0.0/0 (or Render's IPs), and paste
  #     the connection string into the MONGODB_URI env var below.
  #
  - type: web
    name: mcp-server
    runtime: docker            # uses the multi-stage Dockerfile in the repo root
    region: oregon
    plan: free
    rootDir: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    initialDelaySeconds: 30    # gives the NestJS + Mongoose stack time to boot
    envVars:
      - key: NODE_ENV
        value: production

      # PORT is injected by Render automatically — do not change this value
      - key: PORT
        value: 10000

      # MongoDB Atlas connection string (required for production)
      # How to get it:
      #   1. Create a free M0 cluster at https://cloud.mongodb.com
      #   2. Click "Connect" → "Drivers" → copy the connection string
      #   3. Replace <password> and set the database name (e.g. mcp_db)
      # Example: mongodb+srv://user:password@cluster0.xxxxx.mongodb.net/mcp_db
      - key: MONGODB_URI
        sync: false            # you must set this in the Render dashboard

      # MCP API key — auto-generated by Render on first deploy
      - key: MCP_API_KEY
        generateValue: true

      # External API consumed by the server (change to your own if needed)
      - key: EXTERNAL_API_BASE_URL
        value: https://jsonplaceholder.typicode.com

      # Dashboard admin credentials
      - key: DASHBOARD_USER
        value: admin
      - key: DASHBOARD_PASSWORD
        sync: false            # set a strong password in the Render dashboard

      # JWT secret — auto-generated by Render on first deploy
      - key: JWT_SECRET
        generateValue: true
