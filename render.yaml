databases:
  - name: Arthur MCP
    databaseName: arthur_mcp
    plan: free
    ipAllowList: []

services:
  - type: web
    name: arthur-mcp
    runtime: docker
    region: oregon
    plan: free
    rootDir: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_OBSERVABILITY
        value: true
      - key: ENABLE_STRUCTURED_LOGS
        value: true
      - key: ENABLE_METRICS
        value: true
      - key: ENABLE_TRACING
        value: true
      - key: LOG_LEVEL
        value: info
      - key: SERVICE_NAME
        value: arthur-mcp-adapter
      - key: SERVICE_VERSION
        value: 1.0.0
      - key: PROMETHEUS_METRICS_PATH
        value: /metrics

      # ── Database ─────────────────────────────────────────────────────────────
      # DATABASE_URI is a single connection string; the driver (sqlite/postgres/
      # mysql) is auto-detected from its scheme. Set the value in the Render
      # dashboard, e.g.:
      #   sqlite:/app/data/database.sqlite
      #   postgres://user:password@host:5432/db_name       (see the "meu-banco"
      #     managed database above — use its connection string here)
      #   mysql://user:password@host:3306/db_name
      - key: DATABASE_URI
        fromDatabase:
          name: Arthur MCP
          property: connectionString

      # ── JWT ──────────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true
