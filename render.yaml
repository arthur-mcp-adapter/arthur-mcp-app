services:
  - type: web
    name: arthur-mcp-adapter
    runtime: docker
    region: oregon
    plan: free
    rootDir: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    initialDelaySeconds: 30
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_OBSERVABILITY
        value: true
      - key: ENABLE_STRUCTURED_LOGS
        value: true
      - key: ENABLE_METRICS
        value: true
      - key: ENABLE_TRACING
        value: false
      - key: LOG_LEVEL
        value: info
      - key: SERVICE_NAME
        value: arthur-mcp-adapter
      - key: SERVICE_VERSION
        value: 1.0.0
      - key: PROMETHEUS_METRICS_PATH
        value: /metrics

      # ── Database ─────────────────────────────────────────────────────────────
      - key: DATABASE
        value: sqlite
      - key: SQLITE_PATH
        value: /app/data/database.sqlite

      # To use MongoDB Atlas instead, replace the values above with:
      # - key: DATABASE
      #   value: mongodb
      # - key: MONGODB_URI
      #   sync: false

      # ── Credenciais ──────────────────────────────────────────────────────────
      - key: DASHBOARD_USER
        value: admin
      - key: DASHBOARD_PASSWORD
        sync: false   # set in the Render dashboard

      # ── JWT ──────────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true
