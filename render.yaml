services:
  # ── NestJS backend ─────────────────────────────────────────────────────────
  - type: web
    name: mcp-server
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm ci && npm run build:backend
    startCommand: node dist/main.js
    healthCheckPath: /health
    initialDelaySeconds: 15
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # MongoDB Atlas — forneça a connection string no painel do Render
      - key: MONGODB_URI
        sync: false
      # Chave de API MCP — gerada automaticamente pelo Render
      - key: MCP_API_KEY
        generateValue: true
      # URL da API externa consumida pelo servidor
      - key: EXTERNAL_API_BASE_URL
        value: https://jsonplaceholder.typicode.com
      # Credenciais do dashboard administrativo
      - key: DASHBOARD_USER
        value: admin
      - key: DASHBOARD_PASSWORD
        sync: false
      # Segredo JWT — gerado automaticamente pelo Render
      - key: JWT_SECRET
        generateValue: true

  # ── React/Vite frontend (Static Site) ──────────────────────────────────────
  - type: web
    name: mcp-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
