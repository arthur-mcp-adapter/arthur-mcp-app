services:
  # ── Backend NestJS (API only — frontend served separately) ───────────────────
  #
  # Render free tier notes:
  #   • The service sleeps after 15 min of inactivity.
  #   • SQLite: the free tier filesystem is ephemeral — data is lost on each
  #     redeploy. For real persistence, add a Render Disk and point SQLITE_PATH
  #     to the disk path, or use DATABASE=mongodb with Atlas.
  #   • MongoDB Atlas M0 free tier: https://cloud.mongodb.com
  #
  - type: web
    name: mcp-server
    runtime: docker
    region: oregon
    plan: free
    rootDir: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    initialDelaySeconds: 30
    envVars:
      - key: NODE_ENV
        value: production

      # PORT is injected by Render automatically
      - key: PORT
        value: 10000

      # ── Database ─────────────────────────────────────────────────────────────
      # Option 1: SQLite (default, no extra setup needed)
      #   Warning: data is lost on redeploys on the free tier.
      #   For persistence: add a Render Disk mounted at /app/data
      #   and set SQLITE_PATH=/app/data/database.sqlite in the dashboard.
      - key: DATABASE
        value: sqlite
      - key: SQLITE_PATH
        value: /app/data/database.sqlite

      # Option 2: MongoDB Atlas (uncomment and configure in the dashboard)
      # - key: DATABASE
      #   value: mongodb
      # - key: MONGODB_URI
      #   sync: false   # paste the connection string in the Render dashboard

      # ── Dashboard ────────────────────────────────────────────────────────────
      - key: DASHBOARD_USER
        value: admin
      - key: DASHBOARD_PASSWORD
        value: admin    # set a strong password in the Render dashboard

      # ── JWT ──────────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true
