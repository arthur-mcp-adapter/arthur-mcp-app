# fly.toml — Fly.io deployment
# https://fly.io/docs/reference/configuration/
#
# Deploy:
#   fly launch --no-deploy    # creates the app
#   fly secrets set MONGODB_URI="mongodb+srv://..." JWT_SECRET="..." MCP_API_KEY="..."
#   fly deploy
#
# One-click from GitHub Actions: add FLY_API_TOKEN to repo secrets.

app = "mcp-convert"
primary_region = "gru"          # São Paulo — change to your region

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV   = "production"
  PORT       = "3000"

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes           = ["app"]

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1

# Health check
[[services.http_checks]]
  interval        = "30s"
  timeout         = "10s"
  grace_period    = "30s"
  method          = "GET"
  path            = "/health"
  protocol        = "http"
  restart_limit   = 3
