# coolify.yml — Coolify self-hosted PaaS
# https://coolify.io
#
# Coolify is open source and can be installed on any VPS.
# It supports Docker Compose natively — point it to this repo in the dashboard.
#
# Setup:
#   1. Install Coolify on your VPS: curl -fsSL https://cdn.coollabs.io/coolify/install.sh | bash
#   2. Dashboard → New Resource → Docker Compose
#   3. Point to this repository
#   4. Configure the environment variables below
#   5. Deploy

# This file is documentation only — Coolify reads docker-compose.yml from the repo.
# Set the following variables in the Coolify dashboard:
#
#   MONGO_USER        = mcp
#   MONGO_PASSWORD    = <strong password>
#   MONGO_DB          = mcp_db
#   JWT_SECRET        = <openssl rand -hex 64>
#   MCP_API_KEY       = <openssl rand -hex 32>
#   DASHBOARD_USER    = admin
#   DASHBOARD_PASSWORD = <strong password>
